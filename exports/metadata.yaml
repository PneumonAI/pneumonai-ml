# --- 1. Идентичность и целостность ---
artifact_filename: pneumonia_resnet18_v1.pt
checksum_sha256: 0d73928e78e9e4356a87a63105174a4d98cf777db3256d36c5d4d2d906877285
model_version: resnet18
schema_version: '1.0'

# --- 2. Вход + препроцессинг ---
input_shape: [1, 3, 224, 224]
input_dtype: float32
preprocessing:
  version: '1.0'
  resize:
    height: 224
    width: 224
    interpolation: bilinear
    keep_aspect_ratio: false
  channel_order: RGB
  grayscale_handling: replicate_to_3ch
  scale:
    divide_by: 255.0
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
  op_order: [resize, grayscale_handling, scale, normalize]

# --- 3. Выход ---
outputs:
  - index: 0
    name: logits
    shape: [1, 1]
    semantics: raw_logit
    activation: sigmoid
  - index: 1
    name: feature_maps
    shape: [1, 512, 7, 7]
    dtype: float32

# --- 4. Логика решения ---
threshold: 0.3078
label_rule: "label=pneumonia if sigmoid(logit) >= threshold else normal"
confidence_semantics:
  definition: sigmoid(logit) — always the model's probability that the image shows pneumonia
  range: 0.0 to 1.0
  label_rule: label=pneumonia if confidence >= threshold, else label=normal
  examples:
    - confidence: 0.72
      threshold: 0.3078
      label: pneumonia
    - confidence: 0.15
      threshold: 0.3078
      label: normal
    - confidence: 0.31
      threshold: 0.3078
      label: pneumonia
  disclaimer: confidence is model output probability, not clinical certainty

# --- 5. Grad-CAM контракт ---
gradcam:
  target_layer: layer4
  feature_map_shape: [1, 512, 7, 7]
  target: single_logit
  explains: pneumonia
  graph_alive: true

# --- 6. Метрики ---
metrics:
  test_accuracy: 0.8481
  test_auc: 0.8741
  sensitivity: 0.7439
  specificity: 0.8165
  val_accuracy: 0.8356
